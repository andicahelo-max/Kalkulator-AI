<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator AI</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Kalkulator AI</h1>
    <div id="image-preview-container">
        <img id="image-preview" src="" alt="Image Preview" style="display:none;">
    </div>
    <button id="premium-button">Upgrade to Premium</button>
    <div id="premium-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2>Premium Features</h2>
            <p>Upgrade to premium to access exclusive features!</p>
            <button id="confirm-upgrade">Confirm Upgrade</button>
        </div>
    </div>
    <script>
        // Functionality for image preview
        const imagePreview = document.getElementById('image-preview');
        const imagePreviewContainer = document.getElementById('image-preview-container');

        function showImagePreview(imageUrl) {
            imagePreview.src = imageUrl;
            imagePreview.style.display = 'block';
        }

        // Premium button functionality
        const premiumButton = document.getElementById('premium-button');
        const premiumModal = document.getElementById('premium-modal');
        const closeButton = document.querySelector('.close-button');

        premiumButton.addEventListener('click', () => {
            premiumModal.style.display = 'block';
        });

        closeButton.addEventListener('click', () => {
            premiumModal.style.display = 'none';
        });

        // Example API endpoint
        async function fetchData() {
            try {
                const response = await fetch('https://api.example.com/data');
                const data = await response.json();
                console.log(data);
            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }

        fetchData();
    </script>
</body>
</html>
