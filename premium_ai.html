<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Upgrade Premium - Math AI</title>
    <style>
        :root { --gold: #ffd700; --blue: #0b57d0; --dark: #0f172a; --card-bg: rgba(255, 255, 255, 0.05); }
        
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        /* Tombol Kembali Profesional di Atas */
        .top-nav { width: 100%; max-width: 450px; display: flex; align-items: center; margin-bottom: 20px; }
        .btn-back-top { background: none; border: none; color: #94a3b8; font-size: 16px; cursor: pointer; display: flex; align-items: center; gap: 5px; text-decoration: none; transition: 0.3s; }
        .btn-back-top:hover { color: white; }

        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { color: var(--gold); margin: 0; font-size: 24px; }
        .header p { color: #94a3b8; font-size: 14px; margin-top: 5px; }
        
        /* Daftar Paket */
        .price-container { width: 100%; max-width: 450px; display: flex; flex-direction: column; gap: 12px; }
        .price-card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 18px; cursor: pointer; transition: 0.3s; position: relative; overflow: hidden; }
        .price-card:hover { border-color: var(--gold); background: rgba(255,215,0,0.05); transform: translateY(-2px); }
        .price-card.featured { border: 2px solid var(--gold); background: rgba(255,215,0,0.08); }
        
        .plan-info h3 { margin: 0; font-size: 16px; color: #f8fafc; }
        .plan-info p { margin: 8px 0 0; font-size: 22px; font-weight: bold; color: var(--gold); }
        .plan-info span { font-size: 13px; color: #94a3b8; font-weight: normal; }
        .badge { position: absolute; top: 10px; right: -30px; background: var(--gold); color: black; font-size: 10px; font-weight: bold; padding: 4px 35px; transform: rotate(45deg); text-transform: uppercase; }

        /* Area Pembayaran QRIS */
        #paymentArea { display: none; background: white; color: black; padding: 25px; border-radius: 25px; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.3); animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .qris-box { width: 220px; height: 220px; margin: 15px auto; border: 1px solid #eee; border-radius: 12px; overflow: hidden; }
        .qris-box img { width: 100%; height: 100%; object-fit: contain; }
        
        .id-box { background: #f8fafc; padding: 12px; border-radius: 10px; font-family: 'Courier New', monospace; font-weight: bold; margin: 10px 0; border: 1px dashed #cbd5e1; color: #1e293b; font-size: 18px; }

        .btn-wa { background: #25d366; color: white; padding: 16px; border-radius: 12px; text-decoration: none; display: block; font-weight: bold; margin-top: 15px; font-size: 16px; transition: 0.3s; }
        .btn-wa:hover { background: #1eb954; }
        .btn-cancel-bottom { background: none; border: none; color: #ef4444; margin-top: 15px; cursor: pointer; font-size: 14px; font-weight: 500; }
    </style>
</head>
<body>

    <div class="top-nav" id="topNav">
        <a href="kalkulator_ai.html" class="btn-back-top">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Kembali
        </a>
    </div>

    <div class="header" id="headerText">
        <h1>Pilih Paket Premium 👑</h1>
        <p>Akses fitur cerdas tanpa batas token</p>
    </div>

    <div class="price-container" id="listHarga">
        <div class="price-card" onclick="pilihPaket('Pelajar', 25000)">
            <div class="plan-info">
                <h3>Paket Pelajar</h3>
                <p>Rp 25.000 <span>/bulan</span></p>
            </div>
        </div>

        <div class="price-card" onclick="pilihPaket('Standar', 78000)">
            <div class="plan-info">
                <h3>Bulanan Standar</h3>
                <p>Rp 78.000 <span>/bulan</span></p>
            </div>
        </div>

        <div class="price-card featured" onclick="pilihPaket('Pro', 110000)">
            <div class="badge">Terlaris</div>
            <div class="plan-info">
                <h3>Bulanan Pro</h3>
                <p>Rp 110.000 <span>/bulan</span></p>
            </div>
        </div>

        <div class="price-card" onclick="pilihPaket('Tahunan', 256000)">
            <div class="plan-info">
                <h3>Tahunan Pro</h3>
                <p>Rp 256.000 <span>/tahun</span></p>
            </div>
        </div>
    </div>

    <div id="paymentArea">
        <h3 id="selectedPlanTitle" style="margin:0; font-size: 18px; color: #1e293b;">Konfirmasi Pembayaran</h3>
        
        <div class="qris-box">
            <img src="qris.png" alt="QRIS PEMBAYARAN">
        </div>

        <p style="font-size: 12px; color: #64748b; margin-bottom: 5px;">ID Transaksi Anda:</p>
        <div class="id-box" id="userIdDisplay"></div>

        <a href="#" id="waButton" class="btn-wa">Kirim Bukti ke WhatsApp</a>
        <button class="btn-cancel-bottom" onclick="location.reload()">Batal & Pilih Paket Lain</button>
    </div>

<script>
    // Inisialisasi ID Transaksi
    let userId = localStorage.getItem('user_id');
    if(!userId) {
        userId = "MATH-" + Math.random().toString(36).substring(2, 8).toUpperCase();
        localStorage.setItem('user_id', userId);
    }

    function pilihPaket(nama, harga) {
        // Sembunyikan elemen daftar harga dan navigasi atas
        document.getElementById('listHarga').style.display = 'none';
        document.getElementById('headerText').style.display = 'none';
        document.getElementById('topNav').style.display = 'none';
        
        // Tampilkan area pembayaran
        document.getElementById('paymentArea').style.display = 'block';
        
        document.getElementById('selectedPlanTitle').innerText = `Paket ${nama} - Rp ${harga.toLocaleString()}`;
        document.getElementById('userIdDisplay').innerText = userId;

        // Siapkan pesan WA yang sangat detail agar Admin (kamu) mudah mendata
        const waNumber = "6285782492057"; // GANTI DENGAN NOMOR WA KAMU
        const pesan = `Halo Admin Math AI,\n\nSaya ingin membeli *Paket ${nama}*.\nID Transaksi: *${userId}*\nTotal Bayar: Rp ${harga.toLocaleString()}\n\nBerikut bukti transfer saya. Mohon diaktifkan secara real-time.`;
        
        document.getElementById('waButton').href = `https://wa.me/${waNumber}?text=${encodeURIComponent(pesan)}`;
    }
</script>

</body>
</html>
